<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fluttershy Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { image-rendering: pixelated; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #ff8ac2;
    font-family: 'Press Start 2P', monospace;
    color: #3d1a2d;
  }
  h1 {
    color: #fff;
    margin-bottom: 16px;
    font-size: 28px;
    text-shadow: 4px 4px 0 #c94389, 8px 8px 0 #3d1a2d;
    letter-spacing: 2px;
  }
  .info {
    color: #fff;
    margin-bottom: 16px;
    font-size: 10px;
    text-shadow: 2px 2px 0 #c94389;
  }
  .game {
    position: relative;
    width: 800px;
    height: 300px;
    background: #9ad0ff;
    border: 4px solid #3d1a2d;
    box-shadow:
      0 0 0 4px #ffb3d9,
      0 0 0 8px #3d1a2d,
      8px 8px 0 8px #3d1a2d;
    overflow: hidden;
    image-rendering: pixelated;
  }
  .cloud {
    position: absolute;
    image-rendering: pixelated;
  }
  .cloud::before {
    content: '';
    display: block;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(#fff, #fff) 16px 0 / 48px 8px no-repeat,
      linear-gradient(#fff, #fff) 8px 8px / 64px 8px no-repeat,
      linear-gradient(#fff, #fff) 0 16px / 80px 8px no-repeat,
      linear-gradient(#fff, #fff) 8px 24px / 64px 8px no-repeat;
  }
  #cloud1 { top: 24px; width: 80px; height: 32px; animation: drift 18s linear infinite; }
  #cloud2 { top: 56px; width: 80px; height: 32px; animation: drift 24s linear infinite; animation-delay: -8s; }
  #cloud3 { top: 16px; width: 80px; height: 32px; animation: drift 30s linear infinite; animation-delay: -18s; }
  @keyframes drift {
    from { transform: translateX(820px); }
    to { transform: translateX(-100px); }
  }
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 90px;
    background:
      linear-gradient(#3d1a2d, #3d1a2d) 0 0 / 100% 4px no-repeat,
      repeating-linear-gradient(
        90deg,
        #6bbf59 0px, #6bbf59 16px,
        #55a043 16px, #55a043 32px
      );
  }
  .ground::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #3d6b2d 0px, #3d6b2d 8px,
      #2d4e20 8px, #2d4e20 16px
    );
  }
  #player {
    position: absolute;
    bottom: 82px;
    left: 80px;
    width: 105px;
    height: 93px;
    background-image: url('fluttershy_run_3x.png?v=4');
    background-size: 420px 93px;
    background-position: 0 0;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    transition: bottom 0.05s linear;
    transform-origin: center bottom;
  }
  #player.jumping {
    background-position: 0 0 !important;
    animation: spriteJump 0.55s ease-out;
  }
  @keyframes spriteJump {
    0%   { transform: rotate(0)     translateY(0); }
    30%  { transform: rotate(-14deg) translateY(-3px); }
    60%  { transform: rotate(-16deg) translateY(-2px); }
    100% { transform: rotate(0)     translateY(0); }
  }
  .obstacle {
    position: absolute;
    bottom: 90px;
    width: 32px;
    height: 48px;
    background:
      linear-gradient(#3d1a2d, #3d1a2d) 0 0 / 100% 4px no-repeat,
      linear-gradient(#3d1a2d, #3d1a2d) 0 100% / 100% 4px no-repeat,
      linear-gradient(#3d1a2d, #3d1a2d) 0 12px / 100% 4px no-repeat,
      linear-gradient(#3d1a2d, #3d1a2d) 0 32px / 100% 4px no-repeat,
      repeating-linear-gradient(
        90deg,
        #a85b2f 0px, #a85b2f 4px,
        #8a4820 4px, #8a4820 8px
      );
    border-left: 4px solid #3d1a2d;
    border-right: 4px solid #3d1a2d;
    image-rendering: pixelated;
  }
  #score {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: #fff;
    text-shadow: 3px 3px 0 #3d1a2d;
    letter-spacing: 2px;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    padding: 20px 28px;
    border: 4px solid #3d1a2d;
    box-shadow: 6px 6px 0 0 #c94389, 6px 6px 0 4px #3d1a2d;
    text-align: center;
    color: #3d1a2d;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    line-height: 1.4;
    display: none;
    image-rendering: pixelated;
  }
  #message.show { display: block; }
  .hint {
    margin-top: 14px;
    color: #8b4789;
    font-size: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>FLUTTERSHY RUNNER</h1>
  <div class="info">ПРОБЕЛ = ПРЫЖОК</div>

  <div class="game" id="game">
    <div class="cloud" id="cloud1"></div>
    <div class="cloud" id="cloud2"></div>
    <div class="cloud" id="cloud3"></div>
    <div class="ground"></div>

    <div id="player" class="running" role="img" aria-label="Fluttershy"></div>

    <div id="score">0</div>
    <div id="message">
      <div id="message-text"></div>
      <div class="hint">ПРОБЕЛ = ЗАНОВО</div>
    </div>
  </div>

<script>
  const game = document.getElementById('game');
  const player = document.getElementById('player');
  const scoreEl = document.getElementById('score');
  const messageEl = document.getElementById('message');
  const messageText = document.getElementById('message-text');

  const PLAYER_W = 105;
  const PLAYER_H = 93;
  const PLAYER_LEFT = 80;
  const OBS_W = 32;
  const OBS_H = 48;
  const GROUND = 82;
  const OBSTACLE_BASE = 90;

  let isJumping = false;
  let isGameOver = false;
  let velocity = 0;
  let playerY = 0;
  const gravity = 0.6;
  const jumpPower = 13;

  let score = 0;
  let obstacles = [];
  let obstacleSpeed = 6;
  let spawnTimer = 0;
  let nextSpawn = 100;

  let runFrame = 0;
  let runFrameTimer = 0;
  const FRAME_WIDTH = 105;
  const FRAME_COUNT = 4;

  function updateRunAnimation() {
    if (!isGameOver && !isJumping) {
      runFrameTimer++;
      if (runFrameTimer >= 6) {
        runFrameTimer = 0;
        runFrame = (runFrame + 1) % FRAME_COUNT;
        player.style.backgroundPosition = (-runFrame * FRAME_WIDTH) + 'px 0';
      }
    }
  }

  function jump() {
    if (isGameOver) {
      restart();
      return;
    }
    if (!isJumping) {
      isJumping = true;
      velocity = jumpPower;
      player.classList.remove('running');
      player.classList.remove('jumping');
      void player.offsetWidth;
      player.classList.add('jumping');
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      jump();
    }
  });

  function spawnObstacle() {
    const obs = document.createElement('div');
    obs.className = 'obstacle';
    obs.style.left = '800px';
    game.appendChild(obs);
    obstacles.push({ el: obs, x: 800 });
  }

  function checkCollision(obs) {
    const shrink = 16;
    const pL = PLAYER_LEFT + shrink;
    const pR = PLAYER_LEFT + PLAYER_W - shrink;
    const pB = GROUND + playerY;
    const oL = obs.x + 2;
    const oR = obs.x + OBS_W - 2;
    const oT = OBSTACLE_BASE + OBS_H;
    return pR > oL && pL < oR && pB < oT;
  }

  function gameOver() {
    isGameOver = true;
    player.classList.remove('running', 'jumping');
    messageText.innerHTML = `GAME OVER<br>SCORE: ${score}`;
    messageEl.classList.add('show');
  }

  function restart() {
    obstacles.forEach(o => o.el.remove());
    obstacles = [];
    score = 0;
    scoreEl.textContent = '0';
    obstacleSpeed = 6;
    spawnTimer = 0;
    nextSpawn = 100;
    playerY = 0;
    velocity = 0;
    isJumping = false;
    isGameOver = false;
    runFrame = 0;
    runFrameTimer = 0;
    player.style.backgroundPosition = '0 0';
    messageEl.classList.remove('show');
    player.classList.add('running');
  }

  function loop() {
    if (!isGameOver) {
      updateRunAnimation();
      if (isJumping) {
        playerY += velocity;
        velocity -= gravity;
        if (playerY <= 0) {
          playerY = 0;
          velocity = 0;
          isJumping = false;
          player.classList.remove('jumping');
          player.classList.add('running');
        }
      }
      player.style.bottom = (GROUND + playerY) + 'px';

      spawnTimer++;
      if (spawnTimer >= nextSpawn) {
        spawnObstacle();
        spawnTimer = 0;
        nextSpawn = 80 + Math.floor(Math.random() * 80);
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= obstacleSpeed;
        obs.el.style.left = obs.x + 'px';

        if (checkCollision(obs)) {
          gameOver();
        }

        if (obs.x < -OBS_W) {
          obs.el.remove();
          obstacles.splice(i, 1);
          score++;
          scoreEl.textContent = score;
          if (score % 5 === 0) obstacleSpeed += 0.5;
        }
      }
    }
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
